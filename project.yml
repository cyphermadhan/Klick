name: KlickKlick
options:
  bundleIdPrefix: world.madhans
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: "YES"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM intentionally NOT set here — it lives in
    # Signing.xcconfig (gitignored), so the repo stays team-agnostic.
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_COMPILATION_MODE: singlefile
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS: ["DEBUG=1"]
      ENABLE_TESTABILITY: "YES"
      ONLY_ACTIVE_ARCH: "YES"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      GCC_OPTIMIZATION_LEVEL: "s"
      DEAD_CODE_STRIPPING: "YES"
      ENABLE_NS_ASSERTIONS: "NO"
      STRIP_INSTALLED_PRODUCT: "YES"
      COPY_PHASE_STRIP: "NO"  # strip at link, not copy — preserves symbols for crash reports
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      VALIDATE_PRODUCT: "YES"
      # CODE_SIGN_IDENTITY is NOT set explicitly: automatic signing
      # (CODE_SIGN_STYLE=Automatic) picks the right cert per destination —
      # "Apple Development" for local builds, "Apple Distribution" for
      # archives going to TestFlight / App Store. Setting the identity
      # manually here would fight with that logic.

packages:
  Sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: 0.9.1

targets:
  KlickKlick:
    type: application
    platform: iOS
    # Both configs read Signing.xcconfig — a gitignored file the developer
    # copies from Signing.xcconfig.example and fills with their team ID.
    # The file can be missing on CI / fresh checkouts; Xcode treats a
    # missing xcconfig as empty, so unsigned builds still work for local dev.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
      # Resources live alongside source files in XcodeGen — there is no
      # separate `resources:` key. The target's Copy Bundle Resources
      # phase picks up any non-code files XcodeGen adds, classified by
      # extension. Listed explicitly so they can't be missed by a scan.
      - path: Resources/walkie-press.mp3
        buildPhase: resources
      - path: Resources/walkie-release.mp3
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Klick Klick
        CFBundleName: Klick Klick
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: Used for push-to-talk voice communication.
        NSLocalNetworkUsageDescription: Used to discover and communicate with nearby devices.
        NSCameraUsageDescription: Used to scan pairing QR codes.
        # Bluetooth is required by MultipeerConnectivity (the "Nearby" transport)
        # and by the Meshtastic LoRa radio pair flow (the "Mesh" transport).
        # iOS will surface this string in the permission prompt the first
        # time either subsystem starts — wording covers both.
        NSBluetoothAlwaysUsageDescription: Used to discover nearby phones when WiFi is unavailable and to pair with a LoRa radio for long-range text messages.
        NSBonjourServices:
          - _walkie._udp.
          # MultipeerConnectivity registers its service type under both
          # _tcp. and _udp. subdomains on the local network. Both must be
          # declared or iOS 14+ blocks the browse/advertise with no visible
          # error. Service type stays ≤15 chars per MPC's rules.
          - _klick-ptt-v1._tcp.
          - _klick-ptt-v1._udp.
        # Export compliance. The app uses standard cryptography (libsodium
        # crypto_secretbox: XSalsa20 + Poly1305) purely to protect user
        # data (voice packets) — which qualifies for the primary exemption
        # under US EAR 740.17(b). Declaring NO means we don't need a year
        # review submission with each TestFlight build.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIViewControllerBasedStatusBarAppearance: true
        UIRequiredDeviceCapabilities:
          - arm64
    dependencies:
      - package: Sodium
        product: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.madhans.klick
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # iPhone only — Xcode's project-level default is "1,2" which leaks
        # into TestFlight as "iPad supported" unless explicitly overridden
        # here on the target as well.
        TARGETED_DEVICE_FAMILY: "1"

  KlickKlickTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/KlickKlickTests
    dependencies:
      - target: KlickKlick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.madhans.klick.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  KlickKlick:
    build:
      targets:
        KlickKlick: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KlickKlickTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
